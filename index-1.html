
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RogerLens Intelligence</title>
    
    <style>
      /* Alicerce de Layout - CSS Nativo que carrega instantaneamente */
      * { box-sizing: border-box; margin: 0; padding: 0; }
      
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #f8fafc;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        overflow: hidden;
      }
      
      #root {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
      }

      /* Garantia de Geometria para Gráficos e Mapas */
      .leaflet-container { 
        height: 100% !important; 
        width: 100% !important; 
        background-color: #f1f5f9;
      }
      
      /* FIX CRÍTICO: Previne width(-1) e height(-1) no Recharts */
      /* Força dimensões mínimas para evitar colapso em containers flex/grid */
      .recharts-responsive-container { 
        min-height: 100px !important;
        min-width: 100px !important; 
        width: 100% !important;
        height: 100% !important;
      }
      
      .recharts-wrapper {
        min-width: 100px !important;
        min-height: 100px !important;
      }

      /* Utilitários */
      .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>

{
